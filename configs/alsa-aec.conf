# ALSA AEC (Acoustic Echo Cancellation) virtual devices for WM8960 Audio HAT
#
# Based on SaneBow/alsa-aec (https://github.com/SaneBow/alsa-aec)
# Adapted for WM8960 on Orange Pi Zero 2W at 48kHz native rate.
#
# Requires: snd-aloop kernel module (modprobe snd-aloop)
#
# Architecture:
#   Applications play to "aec" device → audio goes to both speaker AND loopback
#   AEC processor reads from "aec_internal" → gets mic (ch 0) + loopback ref (ch 1)
#   AEC processor writes processed audio to loopback output
#   Applications record from "aec" capture → gets echo-cancelled audio
#
# Install: sudo cp alsa-aec.conf /etc/alsa/conf.d/50-aec.conf

# --- Loopback device endpoints ---
# Subdevice 0: pre-AEC (playback reference → AEC input)
# Subdevice 1: post-AEC (processed audio → application capture)

pcm.aec_loopback_out {
    type plug
    slave.pcm {
        type hw
        card "Loopback"
        device 0
        subdevice 0
    }
}

pcm.aec_loopback_in {
    type plug
    slave.pcm {
        type hw
        card "Loopback"
        device 1
        subdevice 0
    }
}

pcm.aec_loopback_post_out {
    type plug
    slave.pcm {
        type hw
        card "Loopback"
        device 0
        subdevice 1
    }
}

pcm.aec_loopback_post_in {
    type plug
    slave.pcm {
        type hw
        card "Loopback"
        device 1
        subdevice 1
    }
}

# --- Playback that duplicates to speaker + loopback ---
# Audio written here goes to both the WM8960 speaker AND the loopback.
# Uses small dmix buffers to minimize latency (~42ms instead of ~170ms).
pcm.aec_dmix {
    type dmix
    ipc_key 40009
    ipc_perm 0666
    slave {
        pcm "hw:ahub0wm8960"
        period_size 480
        buffer_size 1920
        rate 48000
        channels 2
    }
}

pcm.aec_play {
    type route
    slave.pcm {
        type multi
        slaves.a.pcm "aec_dmix"
        slaves.a.channels 2
        slaves.b.pcm {
            type plug
            slave.pcm "hw:Loopback,0,0"
        }
        slaves.b.channels 1
        bindings.0 { slave a channel 0 }
        bindings.1 { slave a channel 1 }
        bindings.2 { slave b channel 0 }
    }
    slave.channels 3
    ttable.0.0 1
    ttable.1.1 1
    ttable.0.2 0.5
    ttable.1.2 0.5
}

# --- Combined capture: mic (ch 0) + loopback reference (ch 1) ---
# The AEC processor reads from this device to get both signals aligned.
pcm.aec_internal_cap {
    type multi
    slaves.a.pcm "dsnooper"
    slaves.a.channels 1
    slaves.b.pcm {
        type dsnoop
        ipc_key 30009
        slave.pcm {
            type hw
            card "Loopback"
            device 1
            subdevice 0
        }
    }
    slaves.b.channels 1
    bindings.0 { slave a channel 0 }
    bindings.1 { slave b channel 0 }
}

# --- AEC internal device (for the echo canceller binary) ---
# Capture: mic + loopback reference (2ch)
# Playback: processed output → post-AEC loopback
pcm.aec_internal {
    type asym
    capture.pcm "aec_internal_cap"
    playback.pcm "aec_loopback_post_out"
}

# --- User-facing AEC device ---
# Applications use this for echo-cancelled audio.
# Playback: goes to speaker + loopback reference
# Capture: gets post-AEC processed audio
pcm.aec {
    type asym
    playback.pcm "aec_play"
    capture.pcm "aec_loopback_post_in"
}
