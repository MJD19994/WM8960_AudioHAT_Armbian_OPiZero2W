# WM8960 Audio HAT — Echo Cancellation via WebRTC AEC
#
# Creates virtual source/sink nodes that perform acoustic echo cancellation.
# Voice assistant apps MUST:
#   1. Read from "Echo Cancellation Source" for echo-free microphone input
#   2. Write to "Echo Cancellation Sink" for audio playback
# Both are required — the AEC module uses the sink's audio as the reference
# signal to cancel from the source.
#
# Install:
#   sudo cp pipewire-echo-cancel.conf /etc/pipewire/pipewire.conf.d/20-echo-cancel.conf
#   systemctl --user restart pipewire
#
# Requires: pipewire, libspa-0.2-modules, libwebrtc-audio-processing-1-3
#
# Verify:
#   pw-cli list-objects Node | grep -i echo
#
# NOTE: The node.target values below assume the default PipeWire ALSA node
# names for the AHUB WM8960 card. If your device names differ, run:
#   pw-cli list-objects Node | grep node.name
# and update the capture.props and playback.props targets accordingly.

context.modules = [
    {
        name = libpipewire-module-echo-cancel
        args = {
            # WebRTC AEC algorithm (best quality, same as Chrome/Firefox)
            library.name = aec/libspa-aec-webrtc

            # Match the WM8960 hardware rate
            audio.rate = 48000
            audio.channels = 2

            # ~21ms latency at 48kHz — good balance for voice assistants
            node.latency = 1024/48000

            # Capture: reads from the WM8960 microphone
            capture.props = {
                node.name = "Echo Cancellation Capture"
                node.target = "alsa_input.platform-soc_ahub0_mach.stereo-fallback"
                node.passive = true
            }

            # Source: the virtual device applications read from (echo-cancelled audio)
            source.props = {
                node.name = "Echo Cancellation Source"
                node.description = "WM8960 Echo-Cancelled Mic"
                media.class = "Audio/Source"
            }

            # Sink: the virtual device applications write to
            sink.props = {
                node.name = "Echo Cancellation Sink"
                node.description = "WM8960 Echo-Cancelled Speaker"
                media.class = "Audio/Sink"
            }

            # Playback: sends audio to the WM8960 speaker
            playback.props = {
                node.name = "Echo Cancellation Playback"
                node.target = "alsa_output.platform-soc_ahub0_mach.stereo-fallback"
                node.passive = true
            }
        }
    }
]
