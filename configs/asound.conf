# ALSA Configuration for WM8960 Audio HAT
# Orange Pi Zero 2W (Keyestudio ReSpeaker 2-Mic HAT)
#
# This configuration sets up:
#   - Default playback through WM8960
#   - Default capture through WM8960
#   - Software mixing for multiple audio streams
#
# Copyright (C) 2025
# License: MIT

# Define the WM8960 hardware device
pcm.wm8960 {
    type hw
    card "ahub0wm8960"
    device 0
}

# Define control device
ctl.wm8960 {
    type hw
    card "ahub0wm8960"
}

# Software mixer for playback (allows multiple apps to play audio)
pcm.dmixer {
    type dmix
    ipc_key 1024
    ipc_perm 0660
    slave {
        pcm "wm8960"
        period_time 0
        period_size 1024
        buffer_size 8192
        rate 48000
        channels 2
    }
    bindings {
        0 0
        1 1
    }
}

# Software capture mixer (allows multiple apps to record)
pcm.dsnooper {
    type dsnoop
    ipc_key 2048
    ipc_perm 0660
    slave {
        pcm "wm8960"
        period_time 0
        period_size 1024
        buffer_size 8192
        rate 48000
        channels 2
    }
    bindings {
        0 0
        1 1
    }
}

# Full-duplex device combining playback and capture
pcm.asymed {
    type asym
    playback.pcm "dmixer"
    capture.pcm "dsnooper"
}

# Plug device with automatic format conversion
pcm.wm8960plug {
    type plug
    slave.pcm "asymed"
}

# Set WM8960 as default output/input
# NOTE: Requires ahub0wm8960 card to be present. Remove this file to restore system defaults.
pcm.!default {
    type plug
    slave.pcm "asymed"
}

# Default control device
ctl.!default {
    type hw
    card "ahub0wm8960"
}

# Convenience aliases
pcm.wm8960soundcard {
    type plug
    slave.pcm "wm8960"
}

pcm.wm8960sndrec {
    type plug
    slave.pcm "dsnooper"
}

pcm.wm8960sndplay {
    type plug
    slave.pcm "dmixer"
}

# --- Purpose-built device aliases ---
# Convenience aliases with semantic names for common use cases. Each wraps
# dmixer or dsnooper with automatic format/rate conversion via the plug
# plugin — specify the desired rate/channels/format at the arecord/aplay
# command line and ALSA will handle the conversion.
# Use with: arecord -D wm8960_voice, aplay -D wm8960_music, etc.

# Voice capture — plug converts from hardware 48kHz stereo to whatever
# the application requests. Use with: arecord -D wm8960_voice -r 16000 -c 1 -f S16_LE
pcm.wm8960_voice {
    type plug
    slave.pcm "dsnooper"
}

# Music playback — 48kHz stereo, optimal for the WM8960 hardware
pcm.wm8960_music {
    type plug
    slave.pcm "dmixer"
}

# High-quality recording — 48kHz stereo capture
pcm.wm8960_record {
    type plug
    slave.pcm "dsnooper"
}
